<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Price Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">🛒 SmartPrice</div>
    <p class="tagline">Compare prices across Amazon & Flipkart instantly</p>
  </header>

  <main>
    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="Search for a product... e.g. Samsung Galaxy M15"
        autocomplete="off"
      />
      <button id="searchBtn" onclick="search()">Search</button>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="summary" class="summary hidden">
      <span id="summaryText"></span>
    </div>

    <div id="results" class="results-grid"></div>
  </main>

  <footer>
    <p>Prices fetched live · No affiliate links · Free forever</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
